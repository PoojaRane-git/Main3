<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Title -->
    <title>
      Talent Corner HR Services | Recruitment & Staffing Solutions
    </title>

    <!-- SEO Description -->
    <meta
      name="description"
      content="Talent Corner HR Services provides recruitment, staffing, and HR consulting solutions to help businesses hire the right talent across industries."
    />

    <!-- Keywords -->
    <meta
      name="keywords"
      content="Talent Corner, HR Services, Recruitment Agency, Staffing Solutions, Hiring, Talent Acquisition, Franchise Recruitment"
    />

    <!-- Author -->
    <meta name="author" content="Talent Corner HR Services" />

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta property="og:title" content="Talent Corner HR Services | Recruitment Solutions" />
    <meta
      property="og:description"
      content="Connecting businesses with exceptional talent through expert recruitment and HR solutions."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Talent Corner HR Services | Recruitment Solutions"
    />
    <meta
      name="twitter:description"
      content="Professional recruitment and staffing services for growing businesses."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0f172a" />
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
